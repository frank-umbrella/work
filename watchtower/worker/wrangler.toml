name = "watchtower-worker"
main = "src/index.js"
compatibility_date = "2026-05-22"
compatibility_flags = ["nodejs_compat"]

# Pin to the Umbrella MSP Cloudflare account so wrangler deploys to the
# right one even if you're logged into multiple accounts (the personal
# account that hosts stocks-worker / usage-worker / spacex etc. on
# sevendwarfs.workers.dev is intentionally separate).
account_id = "87034c82986d2aacbc4d52e8de0fa2fd"

# No cron trigger — watchtower-worker is purely event-driven by agent check-ins.
# (usage-worker and stocks-worker have crons; this one doesn't need one.)

# Public-equivalent variables. Real secrets go through `wrangler secret put`.
[vars]
# Firebase project ID — same one referenced in the dashboard's web config.
# Not a secret; it's already in the public dashboard SPA.
FIREBASE_PROJECT_ID = "watchtower-6fbe1"

# Sender for IP-change alert emails. Resend's sandbox sender works for now
# because the recipient is always the MSP (Resend account owner), and the
# sandbox sender is allowed to deliver only to the account owner's email.
# Graduate to a verified alerts.umbrellaautomation.com (or similar) when
# we want proper branding.
SENDER_FROM = "Watchtower <onboarding@resend.dev>"

# Default recipient for IP-change alerts. The agent's per-PC config doc
# may override this with a custom recipient or webhook URL.
#
# Until we verify a domain on Resend (e.g. umbrellaautomation.com), the
# sandbox sender (onboarding@resend.dev) can only deliver to the email
# that the Resend account is verified with — so this must match. When
# moving to a distro group later, verify a domain on Resend, swap
# SENDER_FROM to alerts@umbrellaautomation.com (or similar), then
# ALERT_TO can be any address including a distribution list.
ALERT_TO = "frank@umbrellaautomation.com"

# Comma-separated list of dashboard origins allowed to call worker
# admin-facing endpoints (/warranty, /notify-*, /test-webhook).
# Production is the GitHub Pages site; the localhost entries let
# `python -m http.server` style local dev hit the prod worker for
# end-to-end testing without needing wrangler dev.
ALLOWED_ORIGINS = "https://frank-umbrella.github.io,http://localhost:8096,http://127.0.0.1:8096"

# Secrets — set with `wrangler secret put <NAME>`, never live in this file:
#   wrangler secret put FIREBASE_SERVICE_ACCOUNT_JSON  # Service-account JSON for Firestore admin writes
#   wrangler secret put RESEND_API_KEY                  # Resend API key for IP-change alerts
#   wrangler secret put WATCHTOWER_INSTALL_TOKEN        # Optional legacy shared-secret fallback; per-client tokens are the steady-state path
#   wrangler secret put DELL_API_CLIENT_ID              # Optional — Dell TechDirect OAuth client id (for /warranty endpoint)
#   wrangler secret put DELL_API_CLIENT_SECRET          # Optional — Dell TechDirect OAuth client secret
