<!--
  Watchtower installer wizard banner. Portrait composition of the same
  sci-fi tower scene used in watchtower/og-image.svg, scaled to fit Inno
  Setup's 410x797 modern wizard image slot. Rasterized to .bmp by
  installer/make_wizard_images.py via cairosvg.

  Visual elements (top to bottom):
    * Deep navy gradient background
    * Starfield (upper third)
    * Watchtower silhouette, centered horizontally, dominant in the
      middle third. Glowing cyan beacon at the top, tower body with
      cyan window slits and support struts, signal pulses
    * Cyan-glow horizon line and perspective grid emanating from the base
    * Mountain silhouette beneath
    * WATCHTOWER wordmark with cyan glow filter
    * "UMBRELLA AUTOMATION" subtitle
    * "ENDPOINT MONITORING" tagline
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 410 797" width="410" height="797">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020817"/>
      <stop offset="55%" stop-color="#061227"/>
      <stop offset="100%" stop-color="#0a1f3a"/>
    </linearGradient>
    <linearGradient id="towerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15494e"/>
      <stop offset="50%" stop-color="#0a3035"/>
      <stop offset="100%" stop-color="#021015"/>
    </linearGradient>
    <radialGradient id="beaconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5af4e3" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#0a6b6b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a6b6b" stop-opacity="0"/>
    </radialGradient>
    <filter id="titleGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/>
      <feGaussianBlur stdDeviation="9" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="horizonLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a6b6b" stop-opacity="0"/>
      <stop offset="50%" stop-color="#5af4e3" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a6b6b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="410" height="797" fill="url(#bg)"/>

  <!-- Starfield, scattered in the upper half -->
  <g fill="#9bb3b3" opacity="0.55">
    <circle cx="35"  cy="50"  r="1"/>
    <circle cx="80"  cy="90"  r="1.2"/>
    <circle cx="135" cy="40"  r="0.8"/>
    <circle cx="180" cy="110" r="1"/>
    <circle cx="220" cy="65"  r="1.4"/>
    <circle cx="280" cy="35"  r="1"/>
    <circle cx="330" cy="95"  r="0.8"/>
    <circle cx="380" cy="55"  r="1.2"/>
    <circle cx="60"  cy="160" r="1"/>
    <circle cx="120" cy="195" r="0.8"/>
    <circle cx="200" cy="170" r="1.2"/>
    <circle cx="260" cy="210" r="1"/>
    <circle cx="350" cy="180" r="1"/>
    <circle cx="20"  cy="240" r="0.9"/>
    <circle cx="390" cy="270" r="0.9"/>
    <circle cx="160" cy="280" r="0.8"/>
    <circle cx="300" cy="305" r="1"/>
  </g>

  <!-- Watchtower silhouette, centered horizontally. Beacon at (205, 220),
       tower body extends downward to ~y=520. Compact vs the OG because
       we need room for the wordmark below. -->
  <g transform="translate(205, 220)">
    <!-- Beacon halo -->
    <circle cx="0" cy="0" r="95" fill="url(#beaconGlow)"/>

    <!-- Top platform (dishes) -->
    <rect x="-65" y="22" width="16" height="16" fill="url(#towerGrad)"/>
    <rect x="-44" y="22" width="16" height="16" fill="url(#towerGrad)"/>
    <rect x="-23" y="22" width="16" height="16" fill="url(#towerGrad)"/>
    <rect x="-2"  y="22" width="16" height="16" fill="url(#towerGrad)"/>
    <rect x="19"  y="22" width="16" height="16" fill="url(#towerGrad)"/>
    <rect x="40"  y="22" width="16" height="16" fill="url(#towerGrad)"/>
    <rect x="-72" y="40" width="144" height="20" fill="url(#towerGrad)"/>

    <!-- Tower body -->
    <rect x="-48" y="60" width="96" height="240" fill="url(#towerGrad)"/>

    <!-- Beacon -->
    <circle cx="0" cy="0" r="8" fill="#5af4e3"/>
    <circle cx="0" cy="0" r="12" fill="#5af4e3" opacity="0.55"/>

    <!-- Cyan window slits -->
    <rect x="-7" y="90"  width="14" height="34" fill="#5af4e3" opacity="0.7"/>
    <rect x="-7" y="155" width="14" height="34" fill="#5af4e3" opacity="0.55"/>
    <rect x="-7" y="220" width="14" height="34" fill="#5af4e3" opacity="0.4"/>

    <!-- Support struts -->
    <line x1="-48" y1="80" x2="-48" y2="290" stroke="#5af4e3" stroke-width="1" opacity="0.45"/>
    <line x1="48"  y1="80" x2="48"  y2="290" stroke="#5af4e3" stroke-width="1" opacity="0.45"/>
  </g>

  <!-- Perspective grid emanating from base of tower (y=540) -->
  <g stroke="#0a6b6b" stroke-width="1" opacity="0.18" fill="none">
    <line x1="0" y1="555" x2="410" y2="555"/>
    <line x1="0" y1="585" x2="410" y2="585"/>
    <line x1="0" y1="620" x2="410" y2="620"/>
    <line x1="205" y1="540" x2="-40"  y2="797"/>
    <line x1="205" y1="540" x2="80"   y2="797"/>
    <line x1="205" y1="540" x2="205"  y2="797"/>
    <line x1="205" y1="540" x2="330"  y2="797"/>
    <line x1="205" y1="540" x2="450"  y2="797"/>
  </g>

  <!-- Glowing horizon line -->
  <rect x="0" y="540" width="410" height="2" fill="url(#horizonLine)"/>

  <!-- Mountain silhouette -->
  <path d="M 0,540 L 60,505 L 130,525 L 210,490 L 280,520 L 350,500 L 410,520 L 410,540 Z"
        fill="#020817" opacity="0.7"/>

  <!-- WATCHTOWER wordmark, centered, with cyan glow -->
  <text x="205" y="640"
        text-anchor="middle"
        font-family="'Orbitron', 'Segoe UI', Arial Black, sans-serif"
        font-size="38"
        font-weight="900"
        fill="#ffffff"
        letter-spacing="4"
        filter="url(#titleGlow)">WATCHTOWER</text>

  <!-- UMBRELLA AUTOMATION subtitle in cyan -->
  <text x="205" y="668"
        text-anchor="middle"
        font-family="'Orbitron', 'Segoe UI', sans-serif"
        font-size="12"
        font-weight="600"
        fill="#5af4e3"
        letter-spacing="5"
        opacity="0.95">UMBRELLA &#xB7; AUTOMATION</text>

  <!-- Tagline at bottom -->
  <text x="205" y="745"
        text-anchor="middle"
        font-family="'Orbitron', 'Segoe UI', sans-serif"
        font-size="10"
        fill="#7fb3b3"
        letter-spacing="2.5"
        font-weight="500">ENDPOINT MONITORING &#xB7; ALWAYS WATCHING</text>
</svg>
