<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 &mdash; Page not found</title>
<meta name="description" content="The page you're looking for doesn't exist on this site.">
<meta name="robots" content="noindex">
<link rel="icon" href="/work/favicon.svg" type="image/svg+xml">
<style>
  :root {
    --bg: #f6f7f9;
    --surface: #ffffff;
    --ink: #1a1f2b;
    --ink-soft: #475063;
    --line: #e3e6ec;
    --line-strong: #c9cfdb;
    --accent: #1a56db;
    --accent-soft: #eaf0fc;
    --radius: 12px;
    --shadow: 0 1px 2px rgba(20, 25, 40, 0.04), 0 4px 14px rgba(20, 25, 40, 0.05);
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  main {
    max-width: 540px;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 56px 44px 48px;
    text-align: center;
  }
  .err {
    font-size: 88px;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: var(--accent);
    margin: 0 0 4px;
    line-height: 1;
  }
  h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 6px 0 14px;
    color: var(--ink);
  }
  p {
    color: var(--ink-soft);
    margin: 0 0 8px;
    font-size: 15px;
  }
  p.path {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 8px 12px;
    border-radius: 8px;
    display: inline-block;
    margin: 14px 0 24px;
    word-break: break-all;
  }
  .actions {
    margin-top: 26px;
    display: flex; gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  a.btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: background-color .12s ease, border-color .12s ease, color .12s ease;
  }
  a.btn.primary {
    background: var(--accent);
    color: #fff;
    border: 1px solid var(--accent);
  }
  a.btn.primary:hover { background: #1248c2; border-color: #1248c2; }
  a.btn.ghost {
    background: var(--surface);
    color: var(--ink);
    border: 1px solid var(--line-strong);
  }
  a.btn.ghost:hover { background: var(--bg); }
  .marker {
    margin: 0 auto 22px;
    width: 88px; height: 66px;
    display: flex; align-items: center; justify-content: center;
  }
  .marker svg { width: 100%; height: auto; }
</style>
</head>
<body>

<main>
  <div class="marker" aria-hidden="true">
    <svg viewBox="0 0 240 180">
      <path d="M 28 164 L 28 88 L 96 24 L 156 88 L 200 88 L 200 164 Z"
            fill="none" stroke="#9ea4ab" stroke-width="10"
            stroke-linejoin="round" stroke-linecap="round"/>
      <g stroke="#1a56db" stroke-width="5" stroke-linecap="round">
        <line x1="92" y1="102" x2="170" y2="102"/>
        <line x1="60" y1="124" x2="130" y2="124"/>
        <line x1="115" y1="146" x2="186" y2="146"/>
              </g>
      <circle cx="92" cy="102" r="10" fill="#1a56db"/>
      <circle cx="60" cy="124" r="10" fill="#1a56db"/>
      <circle cx="115" cy="146" r="10" fill="#1a56db"/>
    </svg>
  </div>
  <p class="err">404</p>
  <h1>That page isn&rsquo;t here.</h1>
  <p>Maybe a typo, maybe a removed page, maybe a link that hasn&rsquo;t been built yet.</p>
  <p class="path" id="path">checking...</p>
  <div class="actions">
    <a class="btn primary" href="/work/">&larr; Back to Work Hub</a>
    <a class="btn ghost" href="javascript:history.back()">Go back</a>
  </div>
</main>

<script>
  document.getElementById('path').textContent = window.location.pathname;
</script>

</body>
</html>
