<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 &mdash; Page not found</title>
<meta name="description" content="The page you're looking for doesn't exist on this site.">
<meta name="robots" content="noindex">
<link rel="icon" href="/work/favicon.svg" type="image/svg+xml">
<style>
  :root {
    --bg: #f6f7f9;
    --surface: #ffffff;
    --ink: #1a1f2b;
    --ink-soft: #475063;
    --line: #e3e6ec;
    --line-strong: #c9cfdb;
    --accent: #1a56db;
    --accent-soft: #eaf0fc;
    --radius: 12px;
    --shadow: 0 1px 2px rgba(20, 25, 40, 0.04), 0 4px 14px rgba(20, 25, 40, 0.05);
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  main {
    max-width: 540px;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 56px 44px 48px;
    text-align: center;
  }
  .err {
    font-size: 88px;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: var(--accent);
    margin: 0 0 4px;
    line-height: 1;
  }
  h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 6px 0 14px;
    color: var(--ink);
  }
  p {
    color: var(--ink-soft);
    margin: 0 0 8px;
    font-size: 15px;
  }
  p.path {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 8px 12px;
    border-radius: 8px;
    display: inline-block;
    margin: 14px 0 24px;
    word-break: break-all;
  }
  .actions {
    margin-top: 26px;
    display: flex; gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  a.btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: background-color .12s ease, border-color .12s ease, color .12s ease;
  }
  a.btn.primary {
    background: var(--accent);
    color: #fff;
    border: 1px solid var(--accent);
  }
  a.btn.primary:hover { background: #1248c2; border-color: #1248c2; }
  a.btn.ghost {
    background: var(--surface);
    color: var(--ink);
    border: 1px solid var(--line-strong);
  }
  a.btn.ghost:hover { background: var(--bg); }
  .marker {
    margin: 0 auto 22px;
    width: 88px; height: 66px;
    display: flex; align-items: center; justify-content: center;
  }
  .marker svg { width: 100%; height: auto; }
</style>
</head>
<body>

<main>
  <div class="marker" aria-hidden="true">
    <svg viewBox="70 92 116 102">
      <path d="M 126.48 98.88 C 127.20 98.96 127.92 99.04 128.64 99.12 C 145.99 114.08 163.36 129.04 180.72 144.00 C 180.72 146.32 180.72 148.64 180.72 150.96 C 162.88 135.68 145.04 120.40 127.20 105.12 C 127.04 105.12 126.88 105.12 126.72 105.12 C 109.84 119.28 92.96 133.44 76.08 147.60 C 76.08 145.20 76.08 142.80 76.08 140.40 C 93.77 127.76 108.93 111.87 126.48 98.88 Z" fill="#9ea4ab"/>
      <path d="M 91.68 183.60 C 115.28 183.60 138.88 183.60 162.48 183.60 C 162.48 170.48 162.48 157.36 162.48 144.24 C 164.32 146.08 166.16 147.92 168.00 149.76 C 168.00 159.52 168.00 169.28 168.00 179.04 C 168.00 181.41 168.81 187.66 167.28 188.64 C 165.78 189.94 150.75 189.12 147.36 189.12 C 133.36 189.12 119.36 189.12 105.36 189.12 C 99.28 189.12 91.39 189.95 86.16 188.64 C 86.08 179.04 86.00 169.44 85.92 159.84 C 87.84 157.92 89.76 156.00 91.68 154.08 C 91.68 163.92 91.68 173.76 91.68 183.60 Z" fill="#9ea4ab"/>
      <g stroke="#1a56db" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M 132 143 L 137 149 L 161 149"/>
        <line x1="93" y1="163" x2="120" y2="163"/>
        <line x1="140" y1="174" x2="161" y2="174"/>
      </g>
      <circle cx="128" cy="142" r="5" fill="#1a56db"/>
      <circle cx="116" cy="163" r="5" fill="#1a56db"/>
      <circle cx="134" cy="174" r="5" fill="#1a56db"/>
    </svg>
  </div>
  <p class="err">404</p>
  <h1>That page isn&rsquo;t here.</h1>
  <p>Maybe a typo, maybe a removed page, maybe a link that hasn&rsquo;t been built yet.</p>
  <p class="path" id="path">checking...</p>
  <div class="actions">
    <a class="btn primary" href="/work/">&larr; Back to Work Hub</a>
    <a class="btn ghost" href="javascript:history.back()">Go back</a>
  </div>
</main>

<script>
  document.getElementById('path').textContent = window.location.pathname;
</script>

</body>
</html>
