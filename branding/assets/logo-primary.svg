<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 280" role="img" aria-label="Umbrella Automation primary logo">
  <defs>
    <linearGradient id="ua-primary-house" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dde0e3"/>
      <stop offset="1" stop-color="#7e8489"/>
    </linearGradient>
    <linearGradient id="ua-primary-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a4d6ed"/>
      <stop offset="0.18" stop-color="#26a6e6"/>
      <stop offset="0.5" stop-color="#0c5e9c"/>
      <stop offset="0.82" stop-color="#26a6e6"/>
      <stop offset="1" stop-color="#5fc1ec"/>
    </linearGradient>
    <linearGradient id="ua-primary-gray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c8c8c8"/>
      <stop offset="1" stop-color="#6e6e6e"/>
    </linearGradient>
    <filter id="ua-bevel" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dx="-0.4" dy="-0.4" in="SourceAlpha" result="hl-shape"/>
      <feFlood flood-color="white" flood-opacity="0.55" result="hl-color"/>
      <feComposite in="hl-color" in2="hl-shape" operator="in" result="hl"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.5" result="sh-blur"/>
      <feOffset dx="0.7" dy="1" in="sh-blur" result="sh-shape"/>
      <feFlood flood-color="black" flood-opacity="0.35" result="sh-color"/>
      <feComposite in="sh-color" in2="sh-shape" operator="in" result="sh"/>
      <feMerge>
        <feMergeNode in="sh"/>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="hl"/>
      </feMerge>
    </filter>
  </defs>
  <svg x="0" y="20" width="240" height="240" viewBox="70 92 116 102" filter="url(#ua-bevel)">
    <path d="M 126.48 98.88 C 127.20 98.96 127.92 99.04 128.64 99.12 C 145.99 114.08 163.36 129.04 180.72 144.00 C 180.72 146.32 180.72 148.64 180.72 150.96 C 162.88 135.68 145.04 120.40 127.20 105.12 C 127.04 105.12 126.88 105.12 126.72 105.12 C 109.84 119.28 92.96 133.44 76.08 147.60 C 76.08 145.20 76.08 142.80 76.08 140.40 C 93.77 127.76 108.93 111.87 126.48 98.88 Z" fill="url(#ua-primary-house)"/>
    <path d="M 91.68 183.60 C 115.28 183.60 138.88 183.60 162.48 183.60 C 162.48 170.48 162.48 157.36 162.48 144.24 C 164.32 146.08 166.16 147.92 168.00 149.76 C 168.00 159.52 168.00 169.28 168.00 179.04 C 168.00 181.41 168.81 187.66 167.28 188.64 C 165.78 189.94 150.75 189.12 147.36 189.12 C 133.36 189.12 119.36 189.12 105.36 189.12 C 99.28 189.12 91.39 189.95 86.16 188.64 C 86.08 179.04 86.00 169.44 85.92 159.84 C 87.84 157.92 89.76 156.00 91.68 154.08 C 91.68 163.92 91.68 173.76 91.68 183.60 Z" fill="url(#ua-primary-house)"/>
    <g stroke="#1A9BE8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M 130 142 L 137 149 L 161 149"/>
      <line x1="93" y1="163" x2="120" y2="163"/>
      <line x1="132" y1="174" x2="161" y2="174"/>
    </g>
    <circle cx="128" cy="140" r="4.4" fill="#1A9BE8"/>
    <circle cx="118" cy="163" r="4.4" fill="#1A9BE8"/>
    <circle cx="134" cy="174" r="4.4" fill="#1A9BE8"/>
  </svg>
  <text x="280" y="130"
        font-family='"Eurostile","Eurostile LT W01","Microgramma D","Saira","Aldrich","Antonio",system-ui,sans-serif'
        font-weight="900" font-size="130" letter-spacing="3.5"
        fill="url(#ua-primary-blue)">UMBRELLA</text>
  <text x="280" y="240"
        font-family='"Eurostile","Eurostile LT W01","Microgramma D","Saira","Aldrich","Antonio",system-ui,sans-serif'
        font-weight="900" font-size="130" letter-spacing="3.5"
        fill="url(#ua-primary-gray)">AUTOMATION</text>
</svg>
