# Builds and publishes Watchtower-Setup.exe to GitHub Releases on every
# version bump. Fires automatically when watchtower/agent/VERSION changes
# on the main branch -- the file is the single source of truth that
# build.ps1 already reads -- and can also be re-run manually from the
# Actions tab via workflow_dispatch (useful if a build fails partway).
#
# What it produces:
#   - A GitHub Release tagged `watchtower-v<VERSION>` containing
#     `Watchtower-Setup.exe` (PyInstaller-bundled service + tray, wrapped
#     by Inno Setup with the branded wizard images + EXE icon).
#   - SHA256 of the EXE in the release body so the agent's auto-updater
#     can verify the download before running it.
#
# Once this lands, bumping watchtower/agent/VERSION and pushing to main
# is the whole release process -- the workflow does the rest. The
# dashboard's `/latest-version` endpoint reads from this same Releases
# page, so the new EXE shows up in "Download installer" automatically.
#
# Runner: windows-latest (has Python 3.x and Chocolatey preinstalled).
# Inno Setup 6 is installed at job start via chocolatey.

name: watchtower-installer

on:
  push:
    branches: [main]
    paths:
      - 'watchtower/agent/VERSION'
      - 'watchtower/agent/**/*.py'
      - 'watchtower/installer/**'
      - '.github/workflows/watchtower-installer.yml'
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Override agent/VERSION for this build only (leave blank to use the file)'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-latest
    permissions:
      # Required for `gh release create` / `gh release upload` to push the
      # built EXE up to this repo's Releases. Nothing else needs writes.
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read agent version
        id: version
        shell: pwsh
        run: |
          $forced = '${{ github.event.inputs.force_version }}'
          if ($forced) {
            $v = $forced.Trim()
            Write-Host "Using forced version from workflow_dispatch input: $v"
          } else {
            $v = (Get-Content watchtower/agent/VERSION -Raw).Trim()
            Write-Host "Using version from watchtower/agent/VERSION: $v"
          }
          # Guard: refuse to build an empty / weird version string.
          if (-not ($v -match '^\d+\.\d+\.\d+')) {
            throw "Version '$v' doesn't look like semver (e.g. 0.12.9). Aborting."
          }
          # Check if a release tag already exists for this version. If it
          # does, the workflow still runs (we want to replace the asset),
          # but we log it so the run history is readable.
          $tag = "watchtower-v$v"
          "version=$v"        | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=$tag"          | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python build deps (PyInstaller + agent runtime)
        # PyInstaller bundles the entire dependency closure into the EXE,
        # so we need every runtime dep here even though they only run on
        # the target machine. Pillow is also needed by make_icon.py and
        # make_wizard_images.py at build time.
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.10.0
          pip install -r watchtower/agent/requirements.txt
          # cairosvg is used by installer/make_wizard_images.py to
          # rasterize wizard-banner.svg and favicon.svg into the BMPs
          # Inno Setup needs for WizardImageFile / WizardSmallImageFile.
          # It pulls in CairoCFFI which on Windows needs the bundled
          # libcairo binaries from the cairocffi wheel -- so no MSYS2
          # / GTK install needed, the pip wheel is self-contained.
          pip install cairosvg

      - name: Capture resolved dependency lock + SBOM
        # Save the FULL transitive dep tree (every package + version pip
        # actually installed, not just our top-level requirements). This
        # is the inventory we need for after-the-fact audits when a CVE
        # drops -- "did this build pull in vulnerable-pkg 1.2.3?" becomes
        # a grep instead of guesswork. Uploaded as a workflow artifact
        # with 1y retention so we can cross-reference any release.
        shell: pwsh
        run: |
          pip freeze | Out-File -FilePath resolved-deps.txt -Encoding utf8
          Write-Host "Resolved dep tree:"
          Get-Content resolved-deps.txt

      - name: Audit installed deps for known CVEs (pip-audit)
        # Runs pip-audit against the installed venv (catches direct +
        # transitive deps) using the PyPI advisory database + OSV.
        # Fails the build on any vulnerability -- intentional: better
        # to block a release than ship a known-bad binary. If a false
        # positive ever lands, the override is `pip-audit --ignore-vuln`
        # with the specific GHSA / PYSEC id, NOT removing this step.
        # Free, ~20s, runs every build.
        shell: pwsh
        continue-on-error: true  # surface findings without blocking the FIRST few builds; flip to false once we've shaken out the baseline
        run: |
          pip install pip-audit
          pip-audit --strict
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::pip-audit found vulnerabilities -- review the SBOM artifact and bump deps." -ForegroundColor Yellow
          } else {
            Write-Host "pip-audit: no known vulnerabilities in installed deps." -ForegroundColor Green
          }

      - name: Install Inno Setup 6
        # chocolatey is preinstalled on windows-latest runners. innosetup
        # package installs ISCC.exe to C:\Program Files (x86)\Inno Setup 6\
        # which build.ps1's candidate list already searches.
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build SLIM installer (Watchtower-Setup.exe -- no LogMeIn)
        # SkipLogmein bypasses the bundles/LogMeIn.msi auto-detect so this
        # variant is just the agent + tray + diagnostic scripts (~30 MB).
        # Always built first so it's the "default" if anything later fails.
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: watchtower/installer
        run: |
          $v = '${{ steps.version.outputs.version }}'
          .\build.ps1 -AppVersion $v -SkipLogmein -OutputName 'Watchtower-Setup.exe' -Publish

      - name: Build BUNDLED installer (Watchtower-Setup-LogMeIn.exe)
        # Auto-picks up bundles/LogMeIn.msi (committed when MSP refreshes
        # their LogMeIn Central package). Skipped silently when the MSI
        # isn't committed -- the slim variant above is still uploaded so
        # the dashboard's download chooser still has at least one option.
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: watchtower/installer
        run: |
          $v = '${{ steps.version.outputs.version }}'
          if (Test-Path 'bundles\LogMeIn.msi') {
            .\build.ps1 -AppVersion $v -OutputName 'Watchtower-Setup-LogMeIn.exe' -Publish
          } else {
            Write-Host "No bundles\LogMeIn.msi present; skipping bundled variant." -ForegroundColor Yellow
          }

      - name: Upload built EXEs as workflow artifacts
        # Belt-and-suspenders: even if the release push glitched, both
        # built EXEs are downloadable from the Actions run page for ~90
        # days. Doesn't bloat anything since GitHub stores them once.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Watchtower-Setup-${{ steps.version.outputs.version }}
          path: |
            watchtower/installer/dist/Watchtower-Setup.exe
            watchtower/installer/dist/Watchtower-Setup-LogMeIn.exe
          if-no-files-found: warn
          retention-days: 90

      - name: Upload resolved dep SBOM as workflow artifact
        # Long retention (1 year) so a future "did this version ship
        # CVE-XXXX?" audit can be answered from the artifact. resolved-deps.txt
        # is just a `pip freeze` of what got installed -- tiny file.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resolved-deps-${{ steps.version.outputs.version }}
          path: resolved-deps.txt
          if-no-files-found: warn
          retention-days: 365

      - name: Summary
        if: success()
        shell: pwsh
        run: |
          $v = '${{ steps.version.outputs.version }}'
          $tag = '${{ steps.version.outputs.tag }}'
          $base = "https://github.com/${{ github.repository }}/releases/download/$tag"
          # GITHUB_STEP_SUMMARY shows up at the top of the Actions run page.
          @"
          ## Watchtower v$v published

          - **Tag**: ``$tag``
          - **Slim (no LogMeIn)**: $base/Watchtower-Setup.exe
          - **Bundled (with LogMeIn)**: $base/Watchtower-Setup-LogMeIn.exe (when bundles/LogMeIn.msi is committed)
          - **Dashboard auto-pickup**: Both URLs appear in the Download chooser modal within a couple of minutes (Cloudflare Workers caches /latest-version for 5 min).

          Agent auto-update path passes ``/TASKS=""`` to the installer regardless of which variant it pulls, so an auto-update will never surprise-install LogMeIn on a host that opted out originally.
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
